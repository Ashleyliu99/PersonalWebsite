name: Keep Streamlit App Awake

on:
  schedule:
    # Every 6 hours — well within Streamlit Cloud's ~12h inactivity sleep window
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Visit Streamlit app to keep it awake
        run: node ping-streamlit.js
        working-directory: .github/scripts
